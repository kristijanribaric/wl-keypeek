name: Build and release

permissions:
  contents: read

on:
  push:
    branches:
      - '*'
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev libglib2.0-dev libgtk-4-dev libpango1.0-dev libgdk-pixbuf-2.0-dev libcairo2-dev libxdo-dev wget jq pkg-config libdbus-1-dev

      - name: Install appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/appimagetool

      - name: Install AppImage tool
        run: cargo install cargo-appimage

      - name: Build AppImage
        run: |
          cp resources/icon.png icon.png
          cargo appimage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1

      - name: Get version
        id: get_version
        run: echo "VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')" >> $GITHUB_OUTPUT

      - name: Rename AppImage
        run: |
          appimage_path=$(find target -name '*.AppImage' | head -n 1)
          mv "$appimage_path" target/release/keypeek-v${{ steps.get_version.outputs.VERSION }}-linux-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: target/release/keypeek-v${{ steps.get_version.outputs.VERSION }}-linux-x86_64.AppImage

  create-release:
    runs-on: ubuntu-latest
    needs: [build-linux]
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: ./artifacts

      - name: Create release draft
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          files: ./artifacts/*
