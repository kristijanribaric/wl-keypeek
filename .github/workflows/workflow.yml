name: Build and release

permissions:
  contents: read

on:
  push:
    branches:
      - '*'
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev \
            libglib2.0-dev \
            libgtk-4-dev \
            libpango1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libcairo2-dev \
            libdbus-1-dev \
            libwayland-dev \
            wayland-protocols \
            meson ninja-build valac \
            wget jq pkg-config

      - name: Build and install gtk4-layer-shell
        run: |
          git clone --depth=1 --branch v1.0.4 https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
          cd /tmp/gtk4-layer-shell
          meson setup build -Dexamples=false -Ddocs=false -Dtests=false -Dintrospection=false -Dvapi=false --prefix=/usr
          sudo ninja -C build install
          sudo ldconfig

      - name: Install appimagetool
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/appimagetool

      - name: Install cargo-appimage
        run: cargo install cargo-appimage

      - name: Build AppImage
        run: |
          cp resources/icon.png icon.png
          cargo appimage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1

      - name: Get version
        id: get_version
        run: echo "VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')" >> $GITHUB_OUTPUT

      - name: Rename AppImage
        run: |
          appimage_path=$(find target -name '*.AppImage' | head -n 1)
          mv "$appimage_path" target/release/wl-keypeek-v${{ steps.get_version.outputs.VERSION }}-linux-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: target/release/wl-keypeek-v${{ steps.get_version.outputs.VERSION }}-linux-x86_64.AppImage

  create-release:
    runs-on: ubuntu-24.04
    needs: [build-linux]
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: ./artifacts

      - name: Create release draft
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: ./artifacts/*
